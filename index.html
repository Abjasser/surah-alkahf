<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سورة الكهف - القرآن الكريم</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:ital,wght@0,400;0,700;1,400&family=Amiri+Quran&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --bg-primary: #FDF6EC;
            --bg-secondary: #F5EDDA;
            --bg-header: #E8D5B7;
            --text-ayah: #3E2723;
            --text-tafsir: #444444;
            --text-muted: #8B7355;
            --accent: #8B6914;
            --accent-light: #C9A84C;
            --border: #D4C4A8;
            --shadow: rgba(62, 39, 35, 0.1);
        }

        [data-theme="dark"] {
            --bg-primary: #1A1A2E;
            --bg-secondary: #16213E;
            --bg-header: #0F3460;
            --text-ayah: #E8D5B7;
            --text-tafsir: #C4B8A0;
            --text-muted: #7B8794;
            --accent: #C9A84C;
            --accent-light: #E8D5B7;
            --border: #2A2A4A;
            --shadow: rgba(0, 0, 0, 0.3);
        }

        body {
            font-family: 'Amiri', serif;
            background-color: var(--bg-primary);
            color: var(--text-ayah);
            direction: rtl;
            line-height: 2;
            transition: background-color 0.4s ease, color 0.4s ease;
            min-height: 100vh;
        }

        /* Progress Bar */
        #progress-bar {
            position: fixed;
            top: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(to left, var(--accent), var(--accent-light));
            z-index: 1000;
            transition: width 0.1s linear;
            border-radius: 0 0 0 2px;
        }

        /* Night Mode Toggle */
        #theme-toggle {
            position: fixed;
            top: 16px;
            left: 16px;
            z-index: 999;
            background: var(--bg-secondary);
            border: 2px solid var(--border);
            border-radius: 50%;
            width: 48px;
            height: 48px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            transition: all 0.3s ease;
            box-shadow: 0 2px 8px var(--shadow);
        }

        #theme-toggle:hover {
            transform: scale(1.1);
            box-shadow: 0 4px 12px var(--shadow);
        }

        /* Back to Top */
        #back-to-top {
            position: fixed;
            bottom: 24px;
            left: 24px;
            z-index: 999;
            background: var(--accent);
            color: #FDF6EC;
            border: none;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            cursor: pointer;
            font-size: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 12px var(--shadow);
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.3s ease;
            pointer-events: none;
        }

        #back-to-top.visible {
            opacity: 1;
            transform: translateY(0);
            pointer-events: all;
        }

        #back-to-top:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 16px var(--shadow);
        }

        /* Container */
        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px 16px 80px;
        }

        /* Header */
        .surah-header {
            text-align: center;
            padding: 32px 20px 28px;
            margin-bottom: 32px;
            background: var(--bg-header);
            border-radius: 16px;
            border: 2px solid var(--border);
            position: relative;
            overflow: hidden;
        }

        .surah-header::before,
        .surah-header::after {
            content: '﷽';
            position: absolute;
            font-size: 80px;
            opacity: 0.04;
            font-family: 'Amiri Quran', serif;
        }

        .surah-header::before {
            top: -20px;
            right: -30px;
        }

        .surah-header::after {
            bottom: -20px;
            left: -30px;
        }

        .sadaqah {
            font-family: 'Amiri', serif;
            font-size: 18px;
            color: var(--text-muted);
            margin-bottom: 12px;
        }

        .ornament {
            font-size: 28px;
            color: var(--accent);
            letter-spacing: 8px;
            margin-bottom: 8px;
        }

        .surah-header h1 {
            font-family: 'Amiri Quran', serif;
            font-size: 42px;
            font-weight: 400;
            color: var(--text-ayah);
            margin-bottom: 8px;
        }

        .surah-meta {
            font-size: 18px;
            color: var(--text-muted);
        }

        .ornament-bottom {
            font-size: 28px;
            color: var(--accent);
            letter-spacing: 8px;
            margin-top: 8px;
        }

        /* Bismillah */
        .bismillah {
            text-align: center;
            font-family: 'Amiri Quran', serif;
            font-size: 36px;
            color: var(--text-ayah);
            padding: 24px 0;
            margin-bottom: 24px;
        }

        /* Loading */
        .loading-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 80px 20px;
            gap: 20px;
        }

        .spinner {
            width: 48px;
            height: 48px;
            border: 4px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loading-text {
            font-size: 20px;
            color: var(--text-muted);
        }

        /* Error */
        .error-container {
            text-align: center;
            padding: 60px 20px;
        }

        .error-container p {
            font-size: 20px;
            color: var(--text-muted);
            margin-bottom: 16px;
        }

        .retry-btn {
            background: var(--accent);
            color: #FDF6EC;
            border: none;
            padding: 12px 32px;
            border-radius: 8px;
            font-family: 'Amiri', serif;
            font-size: 18px;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .retry-btn:hover {
            opacity: 0.85;
        }

        /* Ayah Content */
        .ayahs-container {
            padding: 0 8px;
        }

        .ayah-block {
            margin-bottom: 4px;
        }

        .ayah-flow {
            text-align: justify;
            line-height: 2.8;
        }

        .ayah-text {
            font-family: 'Amiri Quran', serif;
            font-size: 28px;
            color: var(--text-ayah);
            cursor: pointer;
            transition: color 0.2s ease;
            border-radius: 4px;
        }

        .ayah-text:hover {
            color: var(--accent);
        }

        .ayah-text.active {
            color: var(--accent);
        }

        .ayah-number {
            display: inline-grid;
            place-items: center;
            width: 42px;
            height: 42px;
            margin: 0 4px;
            font-family: sans-serif;
            font-size: 14px;
            font-weight: 600;
            color: var(--accent);
            position: relative;
            vertical-align: middle;
            cursor: pointer;
        }

        .ayah-number::before {
            content: '';
            position: absolute;
            inset: 0;
            border: 2px solid var(--accent);
            border-radius: 50%;
            opacity: 0.6;
        }

        .ayah-number::after {
            content: '';
            position: absolute;
            inset: 4px;
            border: 1px solid var(--accent);
            border-radius: 50%;
            opacity: 0.3;
        }

        .separator {
            display: none;
        }

        /* Tafsir Panel */
        .tafsir-panel {
            display: none;
            background: var(--bg-secondary);
            border-radius: 12px;
            border: 1px solid var(--border);
        }

        .tafsir-panel.open {
            display: block;
            padding: 20px 24px;
            margin: 8px 0 16px;
            animation: tafsirFadeIn 0.3s ease;
        }

        @keyframes tafsirFadeIn {
            from { opacity: 0; transform: translateY(-6px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .tafsir-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 12px;
        }

        .tafsir-label {
            font-size: 14px;
            font-weight: 700;
            color: var(--accent);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .tafsir-close {
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 22px;
            cursor: pointer;
            padding: 4px 8px;
            border-radius: 6px;
            transition: all 0.2s;
            line-height: 1;
        }

        .tafsir-close:hover {
            background: var(--border);
            color: var(--text-ayah);
        }

        .tafsir-text {
            font-family: 'Amiri', serif;
            font-size: 18px;
            color: var(--text-tafsir);
            line-height: 2;
            text-align: justify;
        }

        /* Responsive */
        @media (max-width: 600px) {
            .container {
                padding: 12px 10px 80px;
            }

            .surah-header {
                padding: 24px 14px 20px;
                margin-bottom: 24px;
            }

            .surah-header h1 {
                font-size: 34px;
            }

            .ornament, .ornament-bottom {
                font-size: 22px;
                letter-spacing: 4px;
            }

            .bismillah {
                font-size: 28px;
            }

            .ayah-text {
                font-size: 24px;
            }

            .ayah-number {
                width: 32px;
                height: 32px;
                font-size: 13px;
            }

            .tafsir-panel.open {
                padding: 16px;
            }

            .tafsir-text {
                font-size: 16px;
            }

            #theme-toggle {
                width: 42px;
                height: 42px;
                font-size: 18px;
                top: 12px;
                left: 12px;
            }

            #back-to-top {
                width: 44px;
                height: 44px;
                font-size: 20px;
                bottom: 16px;
                left: 16px;
            }
        }
    </style>
</head>
<body>
    <div id="progress-bar" style="width: 0%"></div>

    <button id="theme-toggle" aria-label="تبديل الوضع الليلي" title="الوضع الليلي">🌙</button>

    <button id="back-to-top" aria-label="العودة للأعلى" title="العودة للأعلى">↑</button>

    <div class="container">
        <header class="surah-header">
            <p class="sadaqah">صدقة جارية عن محمد بن صالح اليحيى</p>
            <div class="ornament">❋ ❊ ❋</div>
            <h1>سورة الكهف</h1>
            <p class="surah-meta">مكية - ١١٠ آيات</p>
            <div class="ornament-bottom">❋ ❊ ❋</div>
        </header>

        <div id="content">
            <div class="loading-container">
                <div class="spinner"></div>
                <p class="loading-text">جاري تحميل سورة الكهف...</p>
            </div>
        </div>
    </div>

    <script>
        // --- State ---
        let ayahsData = null;
        let tafsirData = null;
        const openTafsirs = new Set();

        // --- Arabic-Indic numeral conversion ---
        function toArabicIndic(num) {
            const digits = ['٠','١','٢','٣','٤','٥','٦','٧','٨','٩'];
            return String(num).replace(/\d/g, d => digits[d]);
        }

        // --- Fetch data ---
        async function fetchSurahData() {
            const urls = [
                'https://api.alquran.cloud/v1/surah/18/ar.alafasy',
                'https://api.alquran.cloud/v1/surah/18/ar.muyassar'
            ];

            try {
                const [ayahRes, tafsirRes] = await Promise.all(
                    urls.map(url => fetch(url).then(r => {
                        if (!r.ok) throw new Error(`HTTP ${r.status}`);
                        return r.json();
                    }))
                );

                ayahsData = ayahRes.data.ayahs;
                tafsirData = tafsirRes.data.ayahs;

                renderSurah();
            } catch (err) {
                console.error('Fetch failed:', err);
                showError();
            }
        }

        // --- Show error state ---
        function showError() {
            document.getElementById('content').innerHTML = `
                <div class="error-container">
                    <p>تعذّر تحميل البيانات. تحقق من اتصالك بالإنترنت.</p>
                    <button class="retry-btn" onclick="location.reload()">إعادة المحاولة</button>
                </div>
            `;
        }

        // --- Render the surah ---
        function renderSurah() {
            const content = document.getElementById('content');
            let html = '';

            // Bismillah
            html += '<div class="bismillah">بِسْمِ ٱللَّهِ ٱلرَّحْمَٰنِ ٱلرَّحِيمِ</div>';

            html += '<div class="ayahs-container">';
            html += '<div class="ayah-flow">';

            ayahsData.forEach((ayah, i) => {
                const num = ayah.numberInSurah;
                let text = ayah.text;

                // Remove bismillah prefix from ayah 1
                if (num === 1) {
                    // Strip diacritics to find position reliably
                    const diacriticsRe = /[\u0610-\u061A\u064B-\u065F\u0670\u06D6-\u06DC\u06DF-\u06E4\u06E7\u06E8\u06EA-\u06ED]/g;
                    const plain = text.replace(diacriticsRe, '');
                    const target = 'ٱلحمد';
                    const plainIdx = plain.indexOf(target);
                    if (plainIdx > 0) {
                        // Map plain index back to original string
                        let origIdx = 0, count = 0;
                        while (count < plainIdx && origIdx < text.length) {
                            if (!text[origIdx].match(diacriticsRe)) count++;
                            origIdx++;
                        }
                        text = text.substring(origIdx);
                    }
                }

                html += `<span class="ayah-text" data-ayah="${num}" onclick="toggleTafsir(${num})">${text}</span>`;
                html += `<span class="ayah-number" onclick="toggleTafsir(${num})">${toArabicIndic(num)}</span>`;
                html += `<div class="tafsir-panel" id="tafsir-${num}">
                    <div class="tafsir-header">
                        <span class="tafsir-label">📖 تفسير الآية ${toArabicIndic(num)}</span>
                        <button class="tafsir-close" onclick="toggleTafsir(${num})" aria-label="إغلاق التفسير">&times;</button>
                    </div>
                    <div class="tafsir-text">${tafsirData[i] ? tafsirData[i].text : ''}</div>
                </div>`;
            });

            html += '</div>'; // close ayah-flow
            html += '</div>';
            content.innerHTML = html;
        }

        // --- Toggle tafsir panel ---
        function toggleTafsir(num) {
            const panel = document.getElementById(`tafsir-${num}`);
            const ayahText = document.querySelector(`.ayah-text[data-ayah="${num}"]`);

            if (!panel) return;

            if (openTafsirs.has(num)) {
                panel.classList.remove('open');
                if (ayahText) ayahText.classList.remove('active');
                openTafsirs.delete(num);
            } else {
                panel.classList.add('open');
                if (ayahText) ayahText.classList.add('active');
                openTafsirs.add(num);
                setTimeout(() => panel.scrollIntoView({ behavior: 'smooth', block: 'nearest' }), 50);
            }
        }

        // --- Theme toggle ---
        const themeBtn = document.getElementById('theme-toggle');
        function setTheme(dark) {
            if (dark) {
                document.documentElement.setAttribute('data-theme', 'dark');
                themeBtn.textContent = '☀️';
                themeBtn.title = 'الوضع النهاري';
            } else {
                document.documentElement.removeAttribute('data-theme');
                themeBtn.textContent = '🌙';
                themeBtn.title = 'الوضع الليلي';
            }
        }

        themeBtn.addEventListener('click', () => {
            const isDark = document.documentElement.hasAttribute('data-theme');
            setTheme(!isDark);
            localStorage.setItem('quran-theme', isDark ? 'light' : 'dark');
        });

        // Restore saved theme
        if (localStorage.getItem('quran-theme') === 'dark') {
            setTheme(true);
        }

        // --- Progress bar ---
        function updateProgress() {
            const scrollTop = window.scrollY;
            const docHeight = document.documentElement.scrollHeight - window.innerHeight;
            const progress = docHeight > 0 ? (scrollTop / docHeight) * 100 : 0;
            document.getElementById('progress-bar').style.width = progress + '%';
        }

        // --- Back to top ---
        const backToTopBtn = document.getElementById('back-to-top');
        function updateBackToTop() {
            if (window.scrollY > 400) {
                backToTopBtn.classList.add('visible');
            } else {
                backToTopBtn.classList.remove('visible');
            }
        }

        backToTopBtn.addEventListener('click', () => {
            window.scrollTo({ top: 0, behavior: 'smooth' });
        });

        // --- Scroll listener ---
        let ticking = false;
        window.addEventListener('scroll', () => {
            if (!ticking) {
                requestAnimationFrame(() => {
                    updateProgress();
                    updateBackToTop();
                    ticking = false;
                });
                ticking = true;
            }
        });

        // --- Init ---
        fetchSurahData();
    </script>
</body>
</html>
